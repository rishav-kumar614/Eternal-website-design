<!DOCTYPE html>
<html lang="en" class="dark scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eternal by Azimuth | India's First Ultra-Premium Luxury Funeral Mobility</title>
    <meta name="description" content="From Utility to Legacy. From Transport to Tribute. Eternal provides purpose-built ceremonial funeral mobility solutions for families and institutions across Delhi NCR." />
    <!-- Theme Anti-Flash Script -->
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('eternal_theme');
          if (saved === 'light') {
            document.documentElement.classList.add('light');
            document.documentElement.classList.remove('dark');
          } else {
            document.documentElement.classList.add('dark');
            document.documentElement.classList.remove('light');
          }
        } catch (e) {}
      })();
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body class="bg-obsidian-900 text-slate-100 font-sans antialiased selection:bg-gold-500/30 selection:text-gold-200">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
